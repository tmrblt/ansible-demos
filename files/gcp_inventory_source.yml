auth_kind: serviceaccount
compose:
  ansible_ssh_host: networkInterfaces[0].accessConfigs[0].natIP | default(networkInterfaces[0].networkIP)
  gce_description: description if description else None
  gce_id: id
  gce_image: image
  gce_machine_type: machineType
  gce_metadata: metadata.get("items", []) | items2dict(key_name="key", value_name="value")
  gce_name: name
  gce_network: networkInterfaces[0].network.name
  gce_private_ip: networkInterfaces[0].networkIP
  gce_public_ip: networkInterfaces[0].accessConfigs[0].natIP | default(None)
  gce_status: status
  gce_subnetwork: networkInterfaces[0].subnetwork.name
  gce_tags: tags.get("items", [])
  gce_zone: zone
hostnames:
- name
#- public_ip
#- private_ip
keyed_groups:
#- key: gce_subnetwork
#  prefix: network
#- key: gce_private_ip
#  prefix: ''
#  separator: ''
#- key: gce_public_ip
#  prefix: ''
#  separator: ''
#- key: machineType
#  prefix: ''
#  separator: ''
#- key: zone
#  prefix: ''
#  separator: ''
#- key: gce_tags
#  prefix: tag
#- key: labels
#  prefix: gcp
#- key: status | lower
#  prefix: status
#- key: image
#  prefix: ''
#  separator: ''
plugin: google.cloud.gcp_compute
retrieve_image_info: true
use_contrib_script_compatible_sanitization: true
groups:
  rhel-family: "('rhel' or 'centos') in gce_image"
  debian-family: "('ubuntu' or 'debian') in gce_image"
  linux: "('rhel' or 'centos' or 'ubuntu' or 'debian') in gce_image"
  windows: "'windows' in gce_image"
