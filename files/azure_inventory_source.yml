---
conditional_groups:
  windows: "('windows') in os_profile.system"
  linux: "('linux') in os_profile.system"  
default_host_filters: []
exclude_host_filters:
- powerstate != 'running'
fail_on_template_errors: false
hostvar_expressions:
  os_group: os_profile.system
  ansible_connection: "'winrm' if 'windows' in os_profile.system else ssh"
  ansible_port: "'5985' if 'windows' in os_profile.system else 22"
  ansible_winrm_transport: "'ntlm' if 'windows' in os_profile.system else None"
  computer_name: name
  private_ip: private_ipv4_addresses[0] if private_ipv4_addresses else None
  provisioning_state: provisioning_state | title
  public_ip: public_ipv4_addresses[0] if public_ipv4_addresses else None
  public_ip_id: public_ip_id if public_ip_id is defined else None
  public_ip_name: public_ip_name if public_ip_name is defined else None
  tags: tags if tags else None
  type: resource_type
#  ansible_connection: "'winrm' if 'windows' in os_profile['system']"
#  ansible_winrm_transport: "'basic' if 'windows' in os_profile['system']"
keyed_groups:
- key: resource_group
  prefix: ''
  separator: ''
#- key: os_disk.operating_system_type
#  prefix: ''
#  separator: ''
#- key: dict(tags.keys() | map("regex_replace", "^(.*)$", "\1_") | list | zip(tags.values() | list)) if tags else []
#  prefix: ''
#  separator: ''
#- key: location
#  prefix: ''
#  separator: ''
#- key: tags.keys() | list if tags else []
#  prefix: ''
#  separator: ''
#- key: security_group
#  prefix: ''
#  separator: ''
plain_host_names: true
plugin: azure.azcollection.azure_rm
use_contrib_script_compatible_sanitization: true
compose:
  ansible_host: private_ipv4_addresses[0] if private_ipv4_addresses else None
