---
compose:
  ansible_host: guest.ipAddress
  ansible_connection: "'winrm' if 'win' in config.guestId else ssh"
  ansible_port: "'5985' if 'win' in config.guestId else 22"
  ansible_winrm_transport: "'ntlm' if 'win' in config.guestId else None"
hostnames:
- 'config.name'
filters:
  - runtime.powerState == "poweredOn"
properties:
- config
- runtime
keyed_groups:
- key: tag_category.OS
  prefix: "vmware_tag_os_category_"
  separator: ""
groups:
  linux: "'rhel' in config.guestId or 'centos' in config.guestId or 'ubuntu' in config.guestId or 'debian' in config.guestId or 'sles' in config.guestId or 'suse' in config.guestId or 'bsd' in config.guestId or 'linux' in config.guestId|lower"
  windows: "'win' in config.guestId"
  rhel: "'rhel' in config.guestId|lower"
  rhel_6: "'rhel_6' in config.guestId|lower"
  rhel_7: "'rhel_7' in config.guestId|lower"
  rhel_8: "'rhel_8' in config.guestId|lower"
  rhel_9: "'rhel_9' in config.guestId|lower"
  centos: "'centos' in config.guestId|lower"
  centos_6: "'centos_6' in config.guestId|lower"
  centos_7: "'centos_7' in config.guestId|lower"
  centos_8: "'centos_8' in config.guestId|lower"
  centos_9: "'centos_9' in config.guestId|lower"
  debian: "'debian' in config.guestId|lower"
  debian_9: "'debian_9' in config.guestId|lower"
  debian_10: "'debian_10' in config.guestId|lower"
  debian_11: "'debian_11' in config.guestId|lower"
  debian_12: "'debian_12' in config.guestId|lower"
  ubuntu: "'ubuntu' in image.offer|lower"
  opensuse: "'opensuse' in image.offer|lower"
  sles: "'sles' in image.offer|lower"
  windows_2012: "'windows' in image.offer|lower and '2012' in image.sku|lower"
  windows_2016: "'windows' in image.offer|lower and '2016' in image.sku|lower"
  windows_2019: "'windows' in image.offer|lower and '2019' in image.sku|lower"
  windows_2022: "'windows' in image.offer|lower and '2022' in image.sku|lower"
with_nested_properties: false
